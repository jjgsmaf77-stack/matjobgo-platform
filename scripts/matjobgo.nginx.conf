# 맛JobGO 플랫폼 nginx 설정 (/etc/nginx/sites-available/matjobgo)
# 가비아 g클라우드 Ubuntu + Let's Encrypt SSL + PM2(Next.js) 프록시

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    listen [::]:80;
    server_name matjobgo.co.kr www.matjobgo.co.kr;

    # certbot 인증 경로만 HTTP 허용
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 메인 서버
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name matjobgo.co.kr www.matjobgo.co.kr;

    # SSL 인증서 (certbot 발급 후 자동 생성됨)
    ssl_certificate     /etc/letsencrypt/live/matjobgo.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/matjobgo.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS · 보안 헤더
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 성능 · 압축
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # 업로드 최대 크기 (이미지/이력서)
    client_max_body_size 20M;

    # 정적 파일 캐시 (Next.js 빌드 결과물)
    location /_next/static/ {
        alias /var/www/matjobgo-platform/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # 퍼블릭 이미지 · 업로드 파일
    location /uploads/ {
        alias /var/www/matjobgo-platform/public/uploads/;
        expires 30d;
        access_log off;
    }

    # 기타 퍼블릭 정적 파일
    location ~ ^/(favicon\.ico|robots\.txt|sitemap\.xml|[^/]+\.svg|[^/]+\.png|[^/]+\.jpg)$ {
        root /var/www/matjobgo-platform/public;
        expires 30d;
        access_log off;
    }

    # Next.js 앱 프록시 (PM2 cluster 모드 :3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;
    }

    # 에러 페이지
    error_log /var/log/nginx/matjobgo.error.log;
    access_log /var/log/nginx/matjobgo.access.log;
}
